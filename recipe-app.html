<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rezeptsammlung</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #0c0c0c; }
    input:focus, textarea:focus, select:focus { border-color: rgba(139,197,163,0.4) !important; outline: none; }
    textarea { resize: vertical; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.06); border-radius: 3px; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const defaultProfile = {
      age: 22, sex: "female", height: 162, weight: 57,
      activity: "Daily intense strength training", goal: "Maintenance",
      targetKcal: 2140, targetProtein: 135,
    };

    const defaultRecipes = [
      {
        id: 1, category: "breakfast", title: "Overnight Oats Protein Bowl",
        timing: "Morning", prepTime: 2, cookTime: 0, restTime: 480, servings: 1,
        macros: { kcal: 720, protein: 52, carbs: 85, fat: 15 },
        ingredients: [
          { amount: "80", unit: "g", name: "Haferflocken" },
          { amount: "200", unit: "g", name: "Magerquark" },
          { amount: "100", unit: "g", name: "Skyr" },
          { amount: "100", unit: "ml", name: "Milch (1,5%)" },
          { amount: "1", unit: "Stk", name: "Banane" },
          { amount: "100", unit: "g", name: "Erdbeeren oder Blaubeeren" },
          { amount: "15", unit: "g", name: "Walnüsse" },
          { amount: "1", unit: "TL", name: "Honig" },
        ],
        steps: [
          { title: "Basis mischen", text: "Abends Haferflocken, Magerquark, Skyr und Milch in einer Schüssel vermengen. Mit Honig süßen.", timer: null },
          { title: "Kühlen", text: "Abgedeckt über Nacht in den Kühlschrank stellen.", timer: 28800 },
          { title: "Topping und servieren", text: "Morgens Banane in Scheiben schneiden, mit Beeren und Nüssen toppen. Direkt genießen.", timer: null },
        ],
        notes: "Abends 2 Minuten vorbereiten, morgens direkt essen.", emoji: "🥣",
      },
      {
        id: 2, category: "lunch", title: "High-Protein Hähnchen Bowl",
        timing: "Post-Workout", prepTime: 5, cookTime: 18, restTime: 0, servings: 1,
        macros: { kcal: 650, protein: 50, carbs: 70, fat: 13 },
        ingredients: [
          { amount: "180", unit: "g", name: "Hähnchenbrust" },
          { amount: "75", unit: "g", name: "Reis (roh)" },
          { amount: "80", unit: "g", name: "Mais (Dose)" },
          { amount: "2", unit: "Stk", name: "Tomaten" },
          { amount: "0.5", unit: "Stk", name: "Gurke" },
          { amount: "40", unit: "g", name: "Fetakäse" },
          { amount: "1", unit: "TL", name: "Olivenöl" },
          { amount: "2", unit: "Stk", name: "Knoblauch" },
          { amount: "1", unit: "Prise", name: "Salz" },
          { amount: "1", unit: "Prise", name: "Paprikapulver" },
          { amount: "1", unit: "Prise", name: "Oregano" },
        ],
        steps: [
          { title: "Reis kochen", text: "Reis mit doppelter Wassermenge zum Kochen bringen, dann auf kleiner Flamme köcheln lassen.", timer: 1080 },
          { title: "Hähnchen würzen und braten", text: "Hähnchenbrust in Streifen schneiden, mit Gewürzen und gepresstem Knoblauch würzen. In Olivenöl von jeder Seite scharf anbraten.", timer: 480 },
          { title: "Gemüse vorbereiten", text: "Tomaten und Gurke in Würfel schneiden. Mais abtropfen lassen.", timer: null },
          { title: "Bowl zusammenstellen", text: "Reis in die Bowl, Hähnchen obendrauf, Gemüse drumherum anrichten, Fetakäse darüber krümeln.", timer: null },
        ],
        notes: "Olivenöl auf 1 TL reduziert um Fett zu sparen.", emoji: "🍗",
      },
      {
        id: 3, category: "dinner", title: "Schinken-Käse Omelette mit Rohkost-Salat",
        timing: "Evening", prepTime: 3, cookTime: 7, restTime: 0, servings: 1,
        macros: { kcal: 480, protein: 40, carbs: 6, fat: 32 },
        ingredients: [
          { amount: "3", unit: "Stk", name: "Eier" },
          { amount: "80", unit: "g", name: "Kochschinken" },
          { amount: "40", unit: "g", name: "Frischkäse" },
          { amount: "1", unit: "Stk", name: "Tomate" },
          { amount: "0.5", unit: "Stk", name: "Gurke" },
          { amount: "2", unit: "Blätter", name: "Salat" },
          { amount: "25", unit: "g", name: "Käse gerieben" },
          { amount: "1", unit: "Prise", name: "Salz" },
          { amount: "1", unit: "Prise", name: "Pfeffer" },
        ],
        steps: [
          { title: "Omelette machen", text: "Eier verquirlen, mit Salz und Pfeffer würzen. Pfanne erhitzen, Eier hinein – geriebenen Käse drüber streuen und stocken lassen.", timer: 300 },
          { title: "Füllen und zusammenklappen", text: "Kochschinken in Streifen und Frischkäse auf eine Hälfte geben, Omelette zusammenklappen.", timer: null },
          { title: "Salat vorbereiten", text: "Tomate, Gurke und Salat waschen und schneiden. Alles bleibt roh.", timer: null },
          { title: "Servieren", text: "Omelette neben dem Rohkost-Salat anrichten. Fertig in unter 10 Minuten.", timer: null },
        ],
        notes: "Ideal am Abend: low-carb, viel Protein für die Nacht-Regeneration.", emoji: "🍳",
      },
    ];

    const categories = [
      { id: "all", label: "Alle", icon: "✦" },
      { id: "breakfast", label: "Frühstück", icon: "☀" },
      { id: "lunch", label: "Mittagessen", icon: "◐" },
      { id: "dinner", label: "Abendessen", icon: "☽" },
      { id: "snack", label: "Snacks", icon: "◇" },
    ];

    const catColors = { breakfast: "#f0c674", lunch: "#8bc5a3", dinner: "#a0bfe8", snack: "#d4a0e8" };
    const emojiOpts = ["🍗","🥣","🍳","🥗","🌯","🐟","🍖","🍫","🍓","🥩","🧆","🍜","🥑","🍲","🥞"];
    const unitOpts = ["g","kg","ml","l","TL","EL","Stk","Prise","Dose","Blätter","Scheiben"];

    const IS = { background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 8, padding: "8px 12px", color: "#f5f0eb", fontSize: 13, fontFamily: "'DM Sans',sans-serif", outline: "none", width: "100%", transition: "border-color 0.2s" };
    const LS = { fontSize: 10, letterSpacing: 1.5, textTransform: "uppercase", color: "rgba(255,255,255,0.35)", marginBottom: 5, display: "block", fontWeight: 500 };

    const MacroRing = ({ value, max, color, label }) => {
      const pct = Math.min((value / max) * 100, 100);
      const r = 24, circ = 2 * Math.PI * r, offset = circ - (pct / 100) * circ;
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
          <svg width="62" height="62" viewBox="0 0 62 62">
            <circle cx="31" cy="31" r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="4.5" />
            <circle cx="31" cy="31" r={r} fill="none" stroke={color} strokeWidth="4.5" strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" transform="rotate(-90 31 31)" style={{ transition: "stroke-dashoffset 0.8s cubic-bezier(.4,0,.2,1)" }} />
            <text x="31" y="33" textAnchor="middle" fill="#fff" fontSize="14" fontWeight="700" fontFamily="'DM Sans',sans-serif">{value}</text>
          </svg>
          <span style={{ fontSize: 9, color: "rgba(255,255,255,0.4)", letterSpacing: 1.5, textTransform: "uppercase" }}>{label}</span>
        </div>
      );
    };

    const fmtTimer = (s) => { if (!s) return null; if (s >= 3600) { const h = Math.floor(s/3600), m = Math.round((s%3600)/60); return m ? `${h}h ${m}min` : `${h}h`; } return `${Math.round(s/60)} min`; };

    const DailyBar = ({ label, value, max, color, unit }) => {
      const pct = Math.min((value / max) * 100, 100);
      return (
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
            <span style={{ fontSize: 10, letterSpacing: 1.5, textTransform: "uppercase", color: "rgba(255,255,255,0.35)" }}>{label}</span>
            <span style={{ fontSize: 11, fontWeight: 600, color }}>{value}{unit} <span style={{ fontWeight: 400, color: "rgba(255,255,255,0.2)" }}>/ {max}{unit}</span></span>
          </div>
          <div style={{ height: 6, borderRadius: 3, background: "rgba(255,255,255,0.06)", overflow: "hidden" }}>
            <div style={{ height: "100%", borderRadius: 3, background: `linear-gradient(90deg, ${color}, ${color}aa)`, width: `${pct}%`, transition: "width 1s cubic-bezier(.4,0,.2,1)" }} />
          </div>
        </div>
      );
    };

    const Overlay = ({ children, onClose }) => (
      <div onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: 100, background: "rgba(0,0,0,0.78)", backdropFilter: "blur(14px)", display: "flex", alignItems: "flex-start", justifyContent: "center", overflowY: "auto", padding: "36px 16px", animation: "fadeIn 0.2s ease" }}>
        <div onClick={e => e.stopPropagation()} style={{ background: "#141414", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 20, maxWidth: 640, width: "100%", padding: "32px 28px 36px", position: "relative", animation: "slideUp 0.35s cubic-bezier(.4,0,.2,1)" }}>
          <button onClick={onClose} style={{ position: "absolute", top: 14, right: 18, background: "rgba(255,255,255,0.05)", border: "none", color: "rgba(255,255,255,0.4)", cursor: "pointer", width: 34, height: 34, borderRadius: "50%", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'DM Sans',sans-serif" }}>✕</button>
          {children}
        </div>
      </div>
    );

    function ProfileModal({ profile, onSave, onClose }) {
      const [p, setP] = useState({ ...profile });
      const s = (k, v) => setP(x => ({ ...x, [k]: v }));
      return (
        <Overlay onClose={onClose}>
          <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 24, fontWeight: 400, margin: "0 0 6px" }}>Profil bearbeiten</h2>
          <p style={{ fontSize: 12, color: "rgba(255,255,255,0.3)", margin: "0 0 24px", fontStyle: "italic" }}>Passe deine persönlichen Daten und Ziele an</p>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px 14px" }}>
            <div><label style={LS}>Alter</label><input type="number" value={p.age} onChange={e => s("age", +e.target.value)} style={IS} /></div>
            <div><label style={LS}>Geschlecht</label><select value={p.sex} onChange={e => s("sex", e.target.value)} style={{ ...IS, cursor: "pointer" }}><option value="female" style={{ background: "#1a1a1a" }}>Weiblich</option><option value="male" style={{ background: "#1a1a1a" }}>Männlich</option></select></div>
            <div><label style={LS}>Größe (cm)</label><input type="number" value={p.height} onChange={e => s("height", +e.target.value)} style={IS} /></div>
            <div><label style={LS}>Gewicht (kg)</label><input type="number" value={p.weight} onChange={e => s("weight", +e.target.value)} style={IS} /></div>
          </div>
          <div style={{ marginTop: 16 }}><label style={LS}>Aktivität</label><input value={p.activity} onChange={e => s("activity", e.target.value)} style={IS} /></div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "16px 14px", marginTop: 16 }}>
            <div><label style={LS}>Ziel Kalorien (kcal)</label><input type="number" value={p.targetKcal} onChange={e => s("targetKcal", +e.target.value)} style={IS} /></div>
            <div><label style={LS}>Ziel Protein (g)</label><input type="number" value={p.targetProtein} onChange={e => s("targetProtein", +e.target.value)} style={IS} /></div>
          </div>
          <button onClick={() => onSave(p)} style={{ marginTop: 24, width: "100%", padding: "12px", borderRadius: 12, background: "linear-gradient(135deg, rgba(139,197,163,0.25), rgba(139,197,163,0.1))", border: "1px solid rgba(139,197,163,0.3)", color: "#a8d8b8", cursor: "pointer", fontSize: 14, fontWeight: 600, fontFamily: "'DM Sans',sans-serif" }}>Speichern</button>
        </Overlay>
      );
    }

    function CreateModal({ onSave, onClose }) {
      const [pg, setPg] = useState(0);
      const [r, setR] = useState({
        category: "lunch", title: "", timing: "", emoji: "🍗",
        prepTime: 0, cookTime: 0, restTime: 0, servings: 1,
        macros: { kcal: 0, protein: 0, carbs: 0, fat: 0 },
        ingredients: [{ amount: "", unit: "g", name: "" }],
        steps: [{ title: "", text: "", timer: null }],
        notes: "",
      });
      const sf = (k, v) => setR(x => ({ ...x, [k]: v }));
      const sm = (k, v) => setR(x => ({ ...x, macros: { ...x.macros, [k]: +v || 0 } }));
      const addIng = () => sf("ingredients", [...r.ingredients, { amount: "", unit: "g", name: "" }]);
      const rmIng = (i) => sf("ingredients", r.ingredients.filter((_, j) => j !== i));
      const sIng = (i, k, v) => { const a = [...r.ingredients]; a[i] = { ...a[i], [k]: v }; sf("ingredients", a); };
      const addStp = () => sf("steps", [...r.steps, { title: "", text: "", timer: null }]);
      const rmStp = (i) => sf("steps", r.steps.filter((_, j) => j !== i));
      const sStp = (i, k, v) => { const a = [...r.steps]; a[i] = { ...a[i], [k]: v }; sf("steps", a); };
      const ok = pg === 0 ? r.title.trim() : pg === 1 ? r.ingredients.some(x => x.name.trim()) : r.steps.some(x => x.title.trim());
      const labels = ["Basics", "Zutaten", "Zubereitung"];

      return (
        <Overlay onClose={onClose}>
          <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 24, fontWeight: 400, margin: "0 0 6px" }}>Neues Rezept</h2>
          <p style={{ fontSize: 12, color: "rgba(255,255,255,0.3)", margin: "0 0 20px", fontStyle: "italic" }}>Erstelle dein eigenes Rezept Schritt für Schritt</p>

          <div style={{ display: "flex", gap: 4, marginBottom: 28 }}>
            {labels.map((l, i) => (
              <div key={i} style={{ flex: 1 }}>
                <div style={{ height: 3, borderRadius: 2, transition: "all 0.4s", background: i <= pg ? "#8bc5a3" : "rgba(255,255,255,0.06)" }} />
                <div style={{ fontSize: 9, letterSpacing: 1, textTransform: "uppercase", marginTop: 6, textAlign: "center", color: i <= pg ? "rgba(139,197,163,0.8)" : "rgba(255,255,255,0.2)", fontWeight: 500 }}>{l}</div>
              </div>
            ))}
          </div>

          {pg === 0 && (
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
              <div><label style={LS}>Rezeptname *</label><input value={r.title} onChange={e => sf("title", e.target.value)} placeholder="z.B. Protein Pancakes" style={IS} /></div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 }}>
                <div><label style={LS}>Kategorie</label>
                  <select value={r.category} onChange={e => sf("category", e.target.value)} style={{ ...IS, cursor: "pointer" }}>
                    <option value="breakfast" style={{ background: "#1a1a1a" }}>Frühstück</option>
                    <option value="lunch" style={{ background: "#1a1a1a" }}>Mittagessen</option>
                    <option value="dinner" style={{ background: "#1a1a1a" }}>Abendessen</option>
                    <option value="snack" style={{ background: "#1a1a1a" }}>Snack</option>
                  </select>
                </div>
                <div><label style={LS}>Timing</label><input value={r.timing} onChange={e => sf("timing", e.target.value)} placeholder="z.B. Post-Workout" style={IS} /></div>
              </div>
              <div>
                <label style={LS}>Emoji</label>
                <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                  {emojiOpts.map(em => (
                    <button key={em} onClick={() => sf("emoji", em)} style={{ width: 38, height: 38, borderRadius: 10, fontSize: 20, background: r.emoji === em ? "rgba(139,197,163,0.15)" : "rgba(255,255,255,0.03)", border: `1px solid ${r.emoji === em ? "rgba(139,197,163,0.35)" : "rgba(255,255,255,0.06)"}`, cursor: "pointer", transition: "all 0.2s", display: "flex", alignItems: "center", justifyContent: "center" }}>{em}</button>
                  ))}
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10 }}>
                {[{ l: "Prep (min)", k: "prepTime" }, { l: "Cook (min)", k: "cookTime" }, { l: "Ruhe (min)", k: "restTime" }, { l: "Portionen", k: "servings" }].map(f => (
                  <div key={f.k}><label style={LS}>{f.l}</label><input type="number" min="0" value={r[f.k]} onChange={e => sf(f.k, +e.target.value || 0)} style={IS} /></div>
                ))}
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 10 }}>
                {[{ l: "Kcal", k: "kcal", c: "#e8c9a0" }, { l: "Protein (g)", k: "protein", c: "#8bc5a3" }, { l: "Carbs (g)", k: "carbs", c: "#a0bfe8" }, { l: "Fett (g)", k: "fat", c: "#e8a0a0" }].map(f => (
                  <div key={f.k}><label style={{ ...LS, color: f.c }}>{f.l}</label><input type="number" min="0" value={r.macros[f.k]} onChange={e => sm(f.k, e.target.value)} style={{ ...IS, borderColor: `${f.c}30` }} /></div>
                ))}
              </div>
              <div><label style={LS}>Notizen (optional)</label><textarea value={r.notes} onChange={e => sf("notes", e.target.value)} rows={2} placeholder="z.B. Tipps, Variationen..." style={{ ...IS, minHeight: 50, resize: "vertical" }} /></div>
            </div>
          )}

          {pg === 1 && (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {r.ingredients.map((ing, i) => (
                <div key={i} style={{ display: "flex", gap: 8, alignItems: "flex-end", background: "rgba(255,255,255,0.015)", borderRadius: 10, padding: "10px 12px", border: "1px solid rgba(255,255,255,0.035)" }}>
                  <div style={{ width: 70 }}>{i === 0 && <label style={LS}>Menge</label>}<input value={ing.amount} onChange={e => sIng(i, "amount", e.target.value)} placeholder="180" style={IS} /></div>
                  <div style={{ width: 70 }}>{i === 0 && <label style={LS}>Einheit</label>}<select value={ing.unit} onChange={e => sIng(i, "unit", e.target.value)} style={{ ...IS, cursor: "pointer" }}>{unitOpts.map(u => <option key={u} value={u} style={{ background: "#1a1a1a" }}>{u}</option>)}</select></div>
                  <div style={{ flex: 1 }}>{i === 0 && <label style={LS}>Zutat</label>}<input value={ing.name} onChange={e => sIng(i, "name", e.target.value)} placeholder="Hähnchenbrust" style={IS} /></div>
                  {r.ingredients.length > 1 && <button onClick={() => rmIng(i)} style={{ background: "none", border: "none", color: "rgba(232,160,160,0.5)", cursor: "pointer", fontSize: 18, padding: "4px 6px", lineHeight: 1, flexShrink: 0 }}>×</button>}
                </div>
              ))}
              <button onClick={addIng} style={{ background: "rgba(255,255,255,0.03)", border: "1px dashed rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px", color: "rgba(255,255,255,0.35)", cursor: "pointer", fontSize: 12, fontFamily: "'DM Sans',sans-serif" }}>+ Zutat hinzufügen</button>
            </div>
          )}

          {pg === 2 && (
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {r.steps.map((st, i) => (
                <div key={i} style={{ background: "rgba(255,255,255,0.015)", borderRadius: 12, padding: "14px", border: "1px solid rgba(255,255,255,0.035)" }}>
                  <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 8 }}>
                    <div style={{ width: 24, height: 24, borderRadius: "50%", flexShrink: 0, background: "rgba(139,197,163,0.12)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, color: "#8bc5a3" }}>{i + 1}</div>
                    <input value={st.title} onChange={e => sStp(i, "title", e.target.value)} placeholder="Schritt-Titel" style={{ ...IS, fontWeight: 600 }} />
                    <div style={{ width: 90, flexShrink: 0 }}><input type="number" min="0" value={st.timer ? Math.round(st.timer / 60) : ""} onChange={e => sStp(i, "timer", e.target.value ? +e.target.value * 60 : null)} placeholder="min" style={{ ...IS, textAlign: "center" }} /></div>
                    {r.steps.length > 1 && <button onClick={() => rmStp(i)} style={{ background: "none", border: "none", color: "rgba(232,160,160,0.5)", cursor: "pointer", fontSize: 18, padding: "2px 4px", lineHeight: 1, flexShrink: 0 }}>×</button>}
                  </div>
                  <textarea value={st.text} onChange={e => sStp(i, "text", e.target.value)} placeholder="Beschreibung des Schritts..." rows={2} style={{ ...IS, minHeight: 44, resize: "vertical" }} />
                </div>
              ))}
              <button onClick={addStp} style={{ background: "rgba(255,255,255,0.03)", border: "1px dashed rgba(255,255,255,0.1)", borderRadius: 10, padding: "10px", color: "rgba(255,255,255,0.35)", cursor: "pointer", fontSize: 12, fontFamily: "'DM Sans',sans-serif" }}>+ Schritt hinzufügen</button>
            </div>
          )}

          <div style={{ display: "flex", gap: 10, marginTop: 24 }}>
            {pg > 0 && <button onClick={() => setPg(pg - 1)} style={{ flex: 1, padding: "12px", borderRadius: 12, background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", color: "rgba(255,255,255,0.5)", cursor: "pointer", fontSize: 13, fontWeight: 500, fontFamily: "'DM Sans',sans-serif" }}>Zurück</button>}
            {pg < 2 ? (
              <button onClick={() => setPg(pg + 1)} disabled={!ok} style={{ flex: 2, padding: "12px", borderRadius: 12, background: ok ? "linear-gradient(135deg, rgba(139,197,163,0.25), rgba(139,197,163,0.1))" : "rgba(255,255,255,0.03)", border: `1px solid ${ok ? "rgba(139,197,163,0.3)" : "rgba(255,255,255,0.06)"}`, color: ok ? "#a8d8b8" : "rgba(255,255,255,0.2)", cursor: ok ? "pointer" : "not-allowed", fontSize: 14, fontWeight: 600, fontFamily: "'DM Sans',sans-serif" }}>Weiter</button>
            ) : (
              <button onClick={() => onSave({ ...r, ingredients: r.ingredients.filter(x => x.name.trim()), steps: r.steps.filter(x => x.title.trim()) })} disabled={!ok} style={{ flex: 2, padding: "12px", borderRadius: 12, background: ok ? "linear-gradient(135deg, rgba(139,197,163,0.3), rgba(139,197,163,0.12))" : "rgba(255,255,255,0.03)", border: `1px solid ${ok ? "rgba(139,197,163,0.4)" : "rgba(255,255,255,0.06)"}`, color: ok ? "#a8d8b8" : "rgba(255,255,255,0.2)", cursor: ok ? "pointer" : "not-allowed", fontSize: 14, fontWeight: 600, fontFamily: "'DM Sans',sans-serif" }}>Rezept speichern ✓</button>
            )}
          </div>
        </Overlay>
      );
    }

    function RecipeApp() {
      const [profile, setProfile] = useState(defaultProfile);
      const [recipes, setRecipes] = useState(defaultRecipes);
      const [activeCat, setActiveCat] = useState("all");
      const [expanded, setExpanded] = useState(null);
      const [checked, setChecked] = useState({});
      const [showProfile, setShowProfile] = useState(false);
      const [showCreate, setShowCreate] = useState(false);

      const filtered = activeCat === "all" ? recipes : recipes.filter(r => r.category === activeCat);
      const selected = recipes.find(r => r.id === expanded);
      const daily = recipes.reduce((a, r) => ({ kcal: a.kcal + r.macros.kcal, protein: a.protein + r.macros.protein, carbs: a.carbs + r.macros.carbs, fat: a.fat + r.macros.fat }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });
      const remaining = Math.max(0, profile.targetKcal - daily.kcal);
      const toggle = (rid, si) => { const k = `${rid}-${si}`; setChecked(p => ({ ...p, [k]: !p[k] })); };

      return (
        <div style={{ minHeight: "100vh", background: "#0c0c0c", fontFamily: "'DM Sans', sans-serif", color: "#f5f0eb", position: "relative", overflow: "hidden" }}>
          <div style={{ position: "fixed", inset: 0, zIndex: 0, opacity: 0.025, pointerEvents: "none", backgroundImage: "radial-gradient(circle at 1px 1px, #fff 0.5px, transparent 0)", backgroundSize: "28px 28px" }} />
          <div style={{ position: "fixed", top: "-20%", left: "-10%", width: 500, height: 500, background: "radial-gradient(circle, rgba(139,197,163,0.07) 0%, transparent 70%)", borderRadius: "50%", zIndex: 0, pointerEvents: "none" }} />
          <div style={{ position: "fixed", bottom: "-20%", right: "-5%", width: 600, height: 600, background: "radial-gradient(circle, rgba(200,120,60,0.06) 0%, transparent 70%)", borderRadius: "50%", zIndex: 0, pointerEvents: "none" }} />

          <div style={{ position: "relative", zIndex: 1, maxWidth: 900, margin: "0 auto", padding: "36px 20px 80px" }}>
            <header style={{ marginBottom: 28, textAlign: "center" }}>
              <div style={{ fontSize: 10, letterSpacing: 5, textTransform: "uppercase", color: "rgba(245,240,235,0.25)", marginBottom: 10, fontWeight: 500 }}>Bodybuilding Meal Plan</div>
              <h1 style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(30px, 6vw, 48px)", fontWeight: 400, margin: 0, lineHeight: 1.1, fontStyle: "italic", background: "linear-gradient(135deg, #f5f0eb 0%, #8bc5a3 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>Rezeptsammlung</h1>
              <div style={{ width: 40, height: 1, background: "linear-gradient(90deg, transparent, #8bc5a3, transparent)", margin: "14px auto 0" }} />
            </header>

            <div style={{ background: "rgba(255,255,255,0.025)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 16, padding: "20px 24px", marginBottom: 12 }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 18, flexWrap: "wrap", gap: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 38, height: 38, borderRadius: "50%", background: "linear-gradient(135deg, rgba(139,197,163,0.3), rgba(160,191,232,0.2))", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, border: "1px solid rgba(139,197,163,0.2)" }}>{profile.sex === "female" ? "♀" : "♂"}</div>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{profile.age}J · {profile.height}cm · {profile.weight}kg</div>
                    <div style={{ fontSize: 11, color: "rgba(255,255,255,0.3)" }}>{profile.activity}</div>
                  </div>
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                  <div style={{ fontSize: 9.5, letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 500, color: "#8bc5a3", background: "rgba(139,197,163,0.08)", padding: "6px 14px", borderRadius: 100, border: "1px solid rgba(139,197,163,0.12)" }}>Ziel: {profile.targetKcal} kcal · {profile.targetProtein}g Protein</div>
                  <button onClick={() => setShowProfile(true)} style={{ background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.08)", borderRadius: 100, padding: "6px 14px", color: "rgba(255,255,255,0.5)", cursor: "pointer", fontSize: 12, fontFamily: "'DM Sans',sans-serif", display: "flex", alignItems: "center", gap: 5, transition: "all 0.2s" }}>✎ Bearbeiten</button>
                </div>
              </div>
              <div style={{ display: "flex", gap: 24, flexWrap: "wrap" }}>
                <DailyBar label="Kalorien" value={daily.kcal} max={profile.targetKcal} color="#e8c9a0" unit=" kcal" />
                <DailyBar label="Protein" value={daily.protein} max={profile.targetProtein} color="#8bc5a3" unit="g" />
              </div>
            </div>

            {remaining > 0 && (
              <div style={{ background: "rgba(212,160,232,0.04)", border: "1px solid rgba(212,160,232,0.1)", borderRadius: 12, padding: "12px 18px", marginBottom: 32, display: "flex", alignItems: "flex-start", gap: 12 }}>
                <span style={{ fontSize: 18, flexShrink: 0, marginTop: 1 }}>💡</span>
                <div>
                  <div style={{ fontSize: 9.5, letterSpacing: 1.5, textTransform: "uppercase", color: "rgba(212,160,232,0.6)", marginBottom: 3, fontWeight: 500 }}>Noch {remaining} kcal übrig</div>
                  <div style={{ fontSize: 12.5, color: "rgba(245,240,235,0.5)", lineHeight: 1.5 }}>Füge einen Snack oder eine weitere Mahlzeit hinzu, um dein Tagesziel zu erreichen.</div>
                </div>
              </div>
            )}

            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 32, flexWrap: "wrap", gap: 12 }}>
              <nav style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                {categories.map(cat => {
                  const on = activeCat === cat.id;
                  return <button key={cat.id} onClick={() => { setActiveCat(cat.id); setExpanded(null); }} style={{ background: on ? "linear-gradient(135deg, rgba(139,197,163,0.2), rgba(139,197,163,0.08))" : "rgba(255,255,255,0.025)", border: `1px solid ${on ? "rgba(139,197,163,0.3)" : "rgba(255,255,255,0.06)"}`, borderRadius: 100, padding: "9px 18px", color: on ? "#a8d8b8" : "rgba(245,240,235,0.4)", cursor: "pointer", fontSize: 12, fontWeight: 500, fontFamily: "'DM Sans', sans-serif", letterSpacing: 0.5, transition: "all 0.3s ease", display: "flex", alignItems: "center", gap: 6 }}><span style={{ fontSize: 12 }}>{cat.icon}</span>{cat.label}</button>;
                })}
              </nav>
              <button onClick={() => setShowCreate(true)} style={{ background: "linear-gradient(135deg, rgba(139,197,163,0.2), rgba(139,197,163,0.08))", border: "1px solid rgba(139,197,163,0.3)", borderRadius: 100, padding: "9px 20px", color: "#a8d8b8", cursor: "pointer", fontSize: 12.5, fontWeight: 600, fontFamily: "'DM Sans', sans-serif", transition: "all 0.3s ease", display: "flex", alignItems: "center", gap: 7 }}><span style={{ fontSize: 16, lineHeight: 1 }}>+</span> Neues Rezept</button>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 16 }}>
              {filtered.map((recipe, idx) => {
                const cc = catColors[recipe.category] || "#e8c9a0";
                const tt = (recipe.prepTime || 0) + (recipe.cookTime || 0);
                return (
                  <div key={recipe.id} onClick={() => setExpanded(recipe.id === expanded ? null : recipe.id)}
                    style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 16, padding: "22px 24px", cursor: "pointer", transition: "all 0.35s cubic-bezier(.4,0,.2,1)", position: "relative", overflow: "hidden", animation: `fadeSlideIn 0.5s ease ${idx * 0.08}s both` }}
                    onMouseEnter={e => { e.currentTarget.style.background = "rgba(255,255,255,0.04)"; e.currentTarget.style.borderColor = `${cc}33`; }}
                    onMouseLeave={e => { e.currentTarget.style.background = "rgba(255,255,255,0.02)"; e.currentTarget.style.borderColor = "rgba(255,255,255,0.06)"; }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
                      <div style={{ fontSize: 9, letterSpacing: 2, textTransform: "uppercase", fontWeight: 500, color: cc, background: `${cc}15`, padding: "4px 10px", borderRadius: 100 }}>{categories.find(c => c.id === recipe.category)?.label}</div>
                      <div style={{ fontSize: 11, color: "rgba(255,255,255,0.25)", display: "flex", alignItems: "center", gap: 4 }}><span>⏱</span>{tt > 0 ? `${tt} min` : "No cook"}{recipe.restTime ? <span style={{ color: "rgba(255,255,255,0.15)" }}> + Ruhe</span> : null}</div>
                    </div>
                    <div style={{ position: "absolute", top: 50, right: 18, fontSize: 32, opacity: 0.07 }}>{recipe.emoji}</div>
                    <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: 19, fontWeight: 400, margin: "0 0 4px", lineHeight: 1.25, paddingRight: 30 }}>{recipe.title}</h2>
                    <p style={{ fontSize: 11, color: "rgba(245,240,235,0.3)", margin: "0 0 18px", fontStyle: "italic" }}>{recipe.timing}</p>
                    <div style={{ display: "flex", gap: 14, justifyContent: "space-between", borderTop: "1px solid rgba(255,255,255,0.04)", paddingTop: 14 }}>
                      {[{ l: "kcal", v: recipe.macros.kcal, c: "#e8c9a0" }, { l: "Protein", v: `${recipe.macros.protein}g`, c: "#8bc5a3" }, { l: "Carbs", v: `${recipe.macros.carbs}g`, c: "#a0bfe8" }, { l: "Fett", v: `${recipe.macros.fat}g`, c: "#e8a0a0" }].map(m => (
                        <div key={m.l} style={{ textAlign: "center", flex: 1 }}>
                          <div style={{ fontSize: 15, fontWeight: 700, color: m.c }}>{m.v}</div>
                          <div style={{ fontSize: 8.5, letterSpacing: 1.5, textTransform: "uppercase", color: "rgba(255,255,255,0.25)", marginTop: 2 }}>{m.l}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>

            {filtered.length === 0 && (
              <div style={{ textAlign: "center", padding: "60px 20px", color: "rgba(255,255,255,0.2)" }}>
                <div style={{ fontSize: 40, marginBottom: 12 }}>🍽</div>
                <p style={{ fontStyle: "italic" }}>Keine Rezepte in dieser Kategorie.</p>
              </div>
            )}
          </div>

          {selected && (
            <Overlay onClose={() => setExpanded(null)}>
              <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 10, flexWrap: "wrap" }}>
                <div style={{ fontSize: 9, letterSpacing: 2.5, textTransform: "uppercase", fontWeight: 500, color: catColors[selected.category], background: `${catColors[selected.category]}15`, padding: "4px 12px", borderRadius: 100 }}>{categories.find(c => c.id === selected.category)?.icon} {categories.find(c => c.id === selected.category)?.label}</div>
                <div style={{ fontSize: 10, color: "rgba(255,255,255,0.25)", display: "flex", gap: 10, flexWrap: "wrap" }}>
                  {selected.prepTime > 0 && <span>Prep {selected.prepTime} min</span>}
                  {selected.cookTime > 0 && <span>Cook {selected.cookTime} min</span>}
                  {selected.restTime > 0 && <span>Ruhe {Math.round(selected.restTime / 60)} min</span>}
                </div>
              </div>
              <h2 style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(22px, 4vw, 30px)", fontWeight: 400, margin: "0 0 6px", lineHeight: 1.2 }}>{selected.title}</h2>
              <p style={{ fontSize: 12, color: "rgba(245,240,235,0.3)", margin: "0 0 24px", fontStyle: "italic" }}>{selected.timing} · {selected.servings} Portion{selected.servings > 1 ? "en" : ""}</p>

              <div style={{ display: "flex", justifyContent: "center", gap: 18, marginBottom: 28, background: "rgba(255,255,255,0.02)", borderRadius: 14, padding: "18px 12px", border: "1px solid rgba(255,255,255,0.04)" }}>
                <MacroRing value={selected.macros.kcal} max={800} color="#e8c9a0" label="kcal" />
                <MacroRing value={selected.macros.protein} max={60} color="#8bc5a3" label="Protein" />
                <MacroRing value={selected.macros.carbs} max={100} color="#a0bfe8" label="Carbs" />
                <MacroRing value={selected.macros.fat} max={40} color="#e8a0a0" label="Fett" />
              </div>

              <div style={{ marginBottom: 26 }}>
                <h3 style={{ ...LS, letterSpacing: 3, margin: "0 0 12px" }}>Zutaten</h3>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "4px 16px" }}>
                  {selected.ingredients.map((ing, i) => (
                    <div key={i} style={{ display: "flex", alignItems: "baseline", gap: 8, padding: "6px 0", borderBottom: "1px solid rgba(255,255,255,0.025)" }}>
                      <span style={{ fontSize: 13, fontWeight: 700, color: catColors[selected.category], minWidth: 36, textAlign: "right" }}>{ing.amount}</span>
                      <span style={{ fontSize: 10.5, color: "rgba(245,240,235,0.3)", minWidth: 32 }}>{ing.unit}</span>
                      <span style={{ fontSize: 12.5, color: "rgba(245,240,235,0.75)" }}>{ing.name}</span>
                    </div>
                  ))}
                </div>
              </div>

              <div style={{ marginBottom: 26 }}>
                <h3 style={{ ...LS, letterSpacing: 3, margin: "0 0 12px" }}>Zubereitung</h3>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {selected.steps.map((step, i) => {
                    const ch = checked[`${selected.id}-${i}`];
                    const tl = fmtTimer(step.timer);
                    return (
                      <div key={i} onClick={() => toggle(selected.id, i)} style={{ display: "flex", gap: 12, cursor: "pointer", padding: "12px 14px", borderRadius: 12, background: ch ? "rgba(139,197,163,0.05)" : "rgba(255,255,255,0.015)", border: `1px solid ${ch ? "rgba(139,197,163,0.12)" : "rgba(255,255,255,0.035)"}`, transition: "all 0.25s ease", opacity: ch ? 0.5 : 1 }}>
                        <div style={{ width: 26, height: 26, borderRadius: "50%", flexShrink: 0, background: ch ? "rgba(139,197,163,0.2)" : `${catColors[selected.category]}18`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 700, marginTop: 1, color: ch ? "#8bc5a3" : catColors[selected.category] }}>{ch ? "✓" : i + 1}</div>
                        <div style={{ flex: 1 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3, flexWrap: "wrap" }}>
                            <span style={{ fontSize: 12.5, fontWeight: 600, color: "rgba(245,240,235,0.8)", textDecoration: ch ? "line-through" : "none" }}>{step.title}</span>
                            {tl && <span style={{ fontSize: 9, padding: "2px 8px", borderRadius: 100, background: "rgba(255,255,255,0.05)", color: "rgba(255,255,255,0.3)", letterSpacing: 0.5, whiteSpace: "nowrap" }}>⏱ {tl}</span>}
                          </div>
                          <div style={{ fontSize: 12, color: "rgba(245,240,235,0.4)", lineHeight: 1.55 }}>{step.text}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {selected.notes && (
                <div style={{ background: `${catColors[selected.category]}08`, border: `1px solid ${catColors[selected.category]}18`, borderRadius: 12, padding: "12px 16px", marginBottom: 16, fontSize: 12, color: "rgba(245,240,235,0.5)", lineHeight: 1.6, fontStyle: "italic" }}>📝 {selected.notes}</div>
              )}

              <button onClick={() => { setRecipes(p => p.filter(r => r.id !== selected.id)); setExpanded(null); }} style={{ background: "rgba(232,160,160,0.06)", border: "1px solid rgba(232,160,160,0.15)", borderRadius: 10, padding: "10px 18px", color: "#e8a0a0", cursor: "pointer", fontSize: 12, fontFamily: "'DM Sans',sans-serif", fontWeight: 500, width: "100%", transition: "all 0.2s" }}>Rezept löschen</button>
            </Overlay>
          )}

          {showProfile && <ProfileModal profile={profile} onSave={p => { setProfile(p); setShowProfile(false); }} onClose={() => setShowProfile(false)} />}
          {showCreate && <CreateModal onSave={r => { setRecipes(p => [...p, { ...r, id: Date.now() }]); setShowCreate(false); }} onClose={() => setShowCreate(false)} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<RecipeApp />);
  </script>
</body>
</html>
